<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Campus Visitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a5c, #2e7d52);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .logo {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #1a3a5c, #2e7d52);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .btn-connexion {
            background: linear-gradient(135deg, #1a3a5c, #2e7d52);
            border: none; color: white;
            padding: 12px; border-radius: 8px; width: 100%; font-size: 15px;
        }
        .btn-connexion:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
<div class="card">

    <!-- Logo -->
    <div class="logo">
        <i class="fas fa-university text-white fa-xl"></i>
    </div>

    <h4 class="text-center fw-bold mb-1">Campus Visitor</h4>
    <p class="text-center text-muted mb-4">Connectez-vous pour continuer</p>

    <!-- Message d'erreur si mauvais mot de passe -->
    <div th:if="${param.erreur}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i> Email ou mot de passe incorrect.
    </div>

    <!-- Message après déconnexion -->
    <div th:if="${param.deconnecte}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i> Vous avez été déconnecté.
    </div>

    <!-- Formulaire de connexion -->
    <!-- th:action="@{/login}" → Spring Security intercepte cette URL automatiquement -->
    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <!-- name="username" est obligatoire pour Spring Security -->
            <input type="email" name="username" class="form-control"
                   placeholder="admin@campus.ma" required autofocus>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Mot de passe</label>
            <!-- name="password" est obligatoire pour Spring Security -->
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-connexion">
            <i class="fas fa-sign-in-alt me-2"></i> Se connecter
        </button>
    </form>

    <hr class="my-4">

    <!-- Lien pour les visiteurs -->
    <p class="text-center text-muted small mb-0">
        Vous êtes visiteur ?
        <a th:href="@{/visiteur/inscription}" class="text-success fw-bold">
            Inscrivez votre visite ici
        </a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
